name: testnet

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:stable
    entrypoint:
      - anvil
      - --host=0.0.0.0
      - --auto-impersonate
      - --no-request-size-limit
      - --chain-id=1337
    healthcheck:
      test: [ "CMD", "cast", "chain-id" ]
      interval: 1s
      timeout: 1s
      retries: 10
    ports:
      - 8545:8545
