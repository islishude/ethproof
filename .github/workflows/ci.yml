name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: make fmt-check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: make bindings
      - run: git diff --exit-code
      - run: make test

  e2e:
    runs-on: ubuntu-latest
    env:
      ETH_PROOF_REQUIRE_E2E: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: make bindings
      - run: git diff --exit-code
      - run: make e2e-up
      - run: make e2e-test
      - if: always()
        run: make e2e-down
